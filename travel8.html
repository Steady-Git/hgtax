<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대한민국 여행 지도 · 가본 곳 색칠하기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Song+Myung&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f6f1e4;
    --paper-dark:#ece3cd;
    --ink:#1f2d3d;
    --indigo:#2c4a63;
    --stamp-red:#c4442e;
    --gold:#b8863b;
    --line: rgba(31,45,61,0.16);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; min-height:100%;
    background:
      radial-gradient(circle at 15% 10%, rgba(184,134,59,0.07), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(196,68,46,0.06), transparent 40%),
      var(--paper);
    color:var(--ink);
    font-family:'Noto Sans KR', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:760px;
    margin:0 auto;
    min-height:100vh;
    padding:32px 18px 60px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .eyebrow{
    font-size:12px;
    letter-spacing:0.35em;
    color:var(--gold);
    font-weight:700;
    text-transform:uppercase;
  }
  h1{
    font-family:'Song Myung', serif;
    font-size:28px;
    margin:8px 0 4px;
    text-align:center;
    letter-spacing:0.02em;
  }
  .sub{
    font-size:13px;
    color:rgba(31,45,61,0.6);
    margin-bottom:20px;
    text-align:center;
    line-height:1.6;
  }

  /* ---- palette ---- */
  .palette{
    display:flex;
    align-items:center;
    gap:10px;
    background:var(--paper-dark);
    border:1.5px solid var(--line);
    border-radius:999px;
    padding:8px 14px;
    margin-bottom:22px;
    flex-wrap:wrap;
    justify-content:center;
  }
  .palette-label{
    font-size:11px;
    font-weight:700;
    color:rgba(31,45,61,0.5);
    letter-spacing:0.05em;
    margin-right:2px;
  }
  .swatch{
    width:28px;
    height:28px;
    border-radius:50%;
    border:2px solid transparent;
    cursor:pointer;
    position:relative;
    box-shadow: inset 0 0 0 1px rgba(31,45,61,0.15);
    transition: transform 0.1s ease;
  }
  .swatch:hover{ transform: scale(1.08); }
  .swatch.active{
    border-color: var(--ink);
    transform: scale(1.12);
  }
  .swatch.active::after{
    content:"";
    position:absolute;
    inset:-6px;
    border-radius:50%;
    border:1px solid rgba(31,45,61,0.25);
  }
  .eraser{
    width:28px; height:28px;
    border-radius:50%;
    cursor:pointer;
    background: var(--paper);
    border:2px dashed rgba(31,45,61,0.35);
    display:flex; align-items:center; justify-content:center;
    font-size:13px;
    color:rgba(31,45,61,0.45);
    transition: transform 0.1s ease;
  }
  .eraser:hover{ transform: scale(1.08); }
  .eraser.active{ border-style:solid; border-color:var(--ink); transform:scale(1.12); }

  /* ---- picker card ---- */
  .picker{
    width:100%;
    max-width:460px;
    display:flex;
    align-items:center;
    gap:16px;
    background:var(--paper-dark);
    border:1.5px solid var(--line);
    border-radius:14px;
    padding:16px 18px;
    margin-bottom:28px;
  }
  .picker-stamp{
    flex:0 0 auto;
    width:74px;
    height:74px;
    border-radius:50%;
    border:3px solid var(--stamp-red);
    color:var(--stamp-red);
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-family:'Song Myung', serif;
    font-size:15px;
    line-height:1.2;
    padding:4px;
    transform:rotate(-6deg);
    background:var(--paper);
    flex-shrink:0;
  }
  .picker-stamp.placeholder{ color:rgba(31,45,61,0.3); font-family:'Noto Sans KR'; font-size:12px; }
  .picker-body{ flex:1; min-width:0; }
  .picker-body p{ margin:0 0 8px; font-size:12px; color:rgba(31,45,61,0.55); }
  .picker-actions{ display:flex; gap:8px; flex-wrap:wrap; }
  .btn{
    border:none;
    border-radius:999px;
    font-family:'Noto Sans KR', sans-serif;
    font-weight:700;
    letter-spacing:0.03em;
    cursor:pointer;
    transition: transform 0.08s ease;
  }
  .btn:active{ transform: translateY(2px); }
  .btn:disabled{ opacity:0.5; cursor:default; }
  .btn-primary{
    background:var(--indigo);
    color:var(--paper);
    font-size:13px;
    padding:9px 18px;
    box-shadow: 0 2px 0 rgba(31,45,61,0.25);
  }
  .btn-ghost{
    background:transparent;
    color:var(--ink);
    border:1.5px solid var(--ink);
    font-size:13px;
    padding:8px 16px;
  }
  .btn-ghost:disabled{ border-color: rgba(31,45,61,0.2); color:rgba(31,45,61,0.3);}

  /* ---- map stage ---- */
  .stage{
    width:100%;
    border-radius:16px;
    border:1.5px solid var(--line);
    background:var(--paper-dark);
    padding:14px;
    position:relative;
  }
  .stage svg{ width:100%; height:auto; display:block; }
  .region{
    fill:#d9d2bf;
    stroke:#b9ae93;
    stroke-width:0.6;
    cursor:pointer;
    transition: fill 0.15s ease;
  }
  .region:hover{ fill:#c7bd9f; }
  .region.colored:hover{ opacity:0.85; }
  .region.highlight{ fill:var(--stamp-red) !important; stroke:#8f2f1e !important; }
  .region-label{
    font-family:'Noto Sans KR', sans-serif;
    font-size:6.3px;
    font-weight:500;
    fill:#1f2d3d;
    paint-order:stroke;
    stroke:#f6f1e4;
    stroke-width:0.7px;
    stroke-linejoin:round;
    pointer-events:none;
    text-anchor:middle;
    dominant-baseline:middle;
    user-select:none;
  }
  .stage.labels-off .region-label{ display:none; }
  .label-toggle{
    position:absolute;
    top:22px;
    right:22px;
    display:flex;
    align-items:center;
    gap:6px;
    font-size:11px;
    color:rgba(31,45,61,0.55);
    background:rgba(246,241,228,0.85);
    padding:5px 10px;
    border-radius:999px;
    border:1px solid var(--line);
    cursor:pointer;
    user-select:none;
  }

  /* ---- cloud sync ---- */
  .cloud{
    width:100%;
    max-width:460px;
    margin-bottom:24px;
    background:var(--paper-dark);
    border:1.5px solid var(--line);
    border-radius:14px;
    padding:16px 18px;
  }
  .cloud-title{
    font-size:11px;
    font-weight:700;
    letter-spacing:0.08em;
    color:rgba(31,45,61,0.5);
    margin-bottom:10px;
  }
  .cloud-buttons{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  .cloud-btn{
    flex:1;
    min-width:150px;
    border:none;
    border-radius:10px;
    padding:12px 14px;
    font-family:'Noto Sans KR', sans-serif;
    font-weight:700;
    font-size:13px;
    color:#fff;
    cursor:pointer;
    transition: transform 0.08s ease, opacity 0.15s ease;
  }
  .cloud-btn:active{ transform: translateY(2px); }
  .cloud-btn:disabled{ opacity:0.55; cursor:default; }
  .cloud-btn-load{ background:#3b6ea5; }
  .cloud-btn-save{ background:#3f7d54; }
  .cloud-hint{
    display:flex;
    align-items:center;
    gap:6px;
    margin-top:10px;
    font-size:11px;
    color:rgba(31,45,61,0.5);
  }
  .cloud-hint .dot{
    width:6px; height:6px; border-radius:50%;
    background:var(--gold);
    flex-shrink:0;
  }
  .cloud-status{ font-size:11px; color:rgba(31,45,61,0.5); margin-top:8px; }
  .cloud-status.ok{ color:#3f7d54; font-weight:700; }
  .cloud-status.err{ color:var(--stamp-red); font-weight:700; }

  .tooltip{
    position:absolute;
    pointer-events:none;
    background:var(--indigo);
    color:var(--paper);
    font-size:12px;
    font-weight:700;
    padding:5px 10px;
    border-radius:6px;
    transform:translate(-50%,-130%);
    white-space:nowrap;
    opacity:0;
    transition:opacity 0.1s ease;
    z-index:5;
  }
  .tooltip.show{ opacity:1; }

  .progress-row{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    margin-top:18px;
  }
  .progress-text{
    font-family:'Song Myung', serif;
    font-size:20px;
    color:var(--ink);
  }
  .progress-bar{
    flex:1;
    height:8px;
    border-radius:999px;
    background:rgba(31,45,61,0.12);
    overflow:hidden;
    display:flex;
  }
  .progress-fill-seg{
    height:100%;
    width:0%;
  }
  .legend{
    width:100%;
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    justify-content:center;
    margin-top:10px;
  }
  .legend-item{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:11px;
    color:rgba(31,45,61,0.6);
  }
  .legend-dot{
    width:10px; height:10px; border-radius:50%;
  }
  .legend-count{
    font-weight:700;
    color:var(--ink);
    background:var(--paper-dark);
    border:1px solid var(--line);
    border-radius:999px;
    padding:0 6px;
    min-width:18px;
    text-align:center;
  }
  .reset{
    margin-top:14px;
    background:none;
    border:none;
    font-size:12px;
    color:var(--stamp-red);
    text-decoration:underline;
    cursor:pointer;
    padding:4px;
  }
  .hint{
    margin-top:6px;
    font-size:11px;
    color:rgba(31,45,61,0.4);
    text-align:center;
  }
  footer{
    margin-top:34px;
    font-size:11px;
    color:rgba(31,45,61,0.35);
    text-align:center;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">Korea Travel Map</div>
    <h1>내가 가본 지역들을 색칠해보세요</h1>
    <p class="sub">색을 고른 다음 지도를 클릭하면 칠해져요. 같은 색을 다시 클릭하면 지워져요.</p>

    <div class="cloud">
      <div class="cloud-title">☁️ 클라우드 동기화 (구글 시트)</div>
      <div class="cloud-buttons">
        <button class="cloud-btn cloud-btn-load" id="gsLoadBtn">↓ 클라우드에서 불러오기</button>
        <button class="cloud-btn cloud-btn-save" id="gsSaveBtn">↑ 클라우드에 저장</button>
      </div>
      <div class="cloud-hint"><span class="dot"></span>색칠 변경 시 자동 저장</div>
      <div class="cloud-status" id="gsStatus"></div>
    </div>

    <div class="palette" id="palette">
      <span class="palette-label">색상</span>
      <!-- swatches injected by JS -->
      <div class="eraser active" id="eraserBtn" title="지우개">✕</div>
    </div>

    <div class="picker">
      <div class="picker-stamp placeholder" id="stampFace">뽑기 전</div>
      <div class="picker-body">
        <p id="pickerHint">아직 안 가본 지역 중 하나를 뽑아드려요.</p>
        <div class="picker-actions">
          <button class="btn btn-primary" id="drawBtn">다음 여행지 뽑기</button>
          <button class="btn btn-ghost" id="markVisitedBtn" disabled>이 색으로 칠하기</button>
        </div>
      </div>
    </div>

    <div class="stage" id="stage">
      <svg id="mapSvg" viewBox="0 0 800.0 750.5" xmlns="http://www.w3.org/2000/svg"></svg>
      <div class="tooltip" id="tooltip"></div>
      <label class="label-toggle"><input type="checkbox" id="labelToggle" checked style="margin:0;">이름 표시</label>
    </div>

    <div class="progress-row">
      <div class="progress-text" id="progressText">0/162 (0%) 정복!</div>
    </div>
    <div class="progress-bar" id="progressBar"></div>
    <div class="legend" id="legend"></div>
    <button class="reset" id="resetBtn">색칠 기록 초기화</button>
    <p class="hint">지역을 클릭해서 칠하고, 같은 색을 다시 클릭하면 지워져요.</p>

    <footer>지역 경계 데이터: KOSTAT 2018 (southkorea-maps) · 총 162개 시·군·구 기준</footer>
  </div>

<script>
const MAP = JSON.parse(document.getElementById('map-data').textContent);
const COLORS = [
  { key:'green',  hex:'#3f7d54', dark:'#2f5f40', label:'가본 곳' },
  { key:'blue',   hex:'#3b6ea5', dark:'#2c517a', label:'또 가고 싶은 곳' },
  { key:'gold',   hex:'#c99a3e', dark:'#9a7629', label:'가고 싶은 곳' },
  { key:'red',    hex:'#c4442e', dark:'#8f2f1e', label:'인생 여행지' },
  { key:'purple', hex:'#7d5a99', dark:'#5c4173', label:'가족 여행' },
];
const COLOR_MAP = Object.fromEntries(COLORS.map(c => [c.key, c]));

const svg = document.getElementById('mapSvg');
const tooltip = document.getElementById('tooltip');
const stage = document.getElementById('stage');
const progressText = document.getElementById('progressText');
const progressBar = document.getElementById('progressBar');
const legend = document.getElementById('legend');
const palette = document.getElementById('palette');
const eraserBtn = document.getElementById('eraserBtn');
const stampFace = document.getElementById('stampFace');
const pickerHint = document.getElementById('pickerHint');
const drawBtn = document.getElementById('drawBtn');
const markVisitedBtn = document.getElementById('markVisitedBtn');
const resetBtn = document.getElementById('resetBtn');
const gsLoadBtn = document.getElementById('gsLoadBtn');
const gsSaveBtn = document.getElementById('gsSaveBtn');
const gsStatus = document.getElementById('gsStatus');

const TOTAL = MAP.regions.length;
let regionColor = {};   // id -> color key
let activeColor = COLORS[0].key;
let lastDrawnId = null;
let pathEls = {};
let swatchEls = {};

// ---- cloud sync (Google Sheets via Apps Script web app) ----
// URL is baked in so nothing needs to be entered on the page.
const GS_URL = 'https://script.google.com/macros/s/AKfycbyN19h8L8FtviM42HMAxdyBGSecIBWUn4VIg3v6PMAYaCTpXk6LyocAkR4HbBJEsPFbww/exec';
const GS_MAP_ID = 'korea-travel-map';

async function gsFetchLoad(){
  const res = await fetch(GS_URL + '?mapId=' + encodeURIComponent(GS_MAP_ID));
  const text = await res.text();
  if(!res.ok) throw new Error('HTTP ' + res.status);
  try{
    return JSON.parse(text);
  }catch(e){
    throw new Error('구글 응답이 JSON이 아니에요. Apps Script 배포 시 액세스 권한이 "모든 사용자"로 되어있는지 확인해주세요.');
  }
}

async function gsFetchSave(){
  // text/plain avoids a CORS preflight, which Apps Script web apps don't handle
  const res = await fetch(GS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ mapId: GS_MAP_ID, data: regionColor })
  });
  const text = await res.text();
  if(!res.ok) throw new Error('HTTP ' + res.status);
  try{
    return JSON.parse(text);
  }catch(e){
    throw new Error('구글 응답이 JSON이 아니에요. Apps Script 배포 시 액세스 권한이 "모든 사용자"로 되어있는지 확인해주세요.');
  }
}

function timeNow(){
  const d = new Date();
  return d.toTimeString().slice(0,8);
}

async function gsLoad(showStatus){
  try{
    gsStatus.textContent = '불러오는 중...'; gsStatus.className = 'cloud-status';
    const result = await gsFetchLoad();
    if(result && result.data && Object.keys(result.data).length > 0){
      regionColor = result.data;
      refreshPaint();
    }
    gsStatus.textContent = `클라우드에서 불러왔어요 (${timeNow()}) · ${Object.keys(regionColor).length}개 지역`;
    gsStatus.className = 'cloud-status ok';
    return true;
  }catch(e){
    gsStatus.textContent = '불러오기 실패: ' + (e.message || e);
    gsStatus.className = 'cloud-status err';
    return false;
  }
}

async function gsSave(showStatus){
  try{
    if(showStatus){ gsStatus.textContent = '저장하는 중...'; gsStatus.className = 'cloud-status'; }
    await gsFetchSave();
    gsStatus.textContent = `클라우드에 저장했어요 (${timeNow()}) · ${Object.keys(regionColor).length}개 지역`;
    gsStatus.className = 'cloud-status ok';
    return true;
  }catch(e){
    gsStatus.textContent = '저장 실패: ' + (e.message || e);
    gsStatus.className = 'cloud-status err';
    return false;
  }
}

// ---- storage (auto-saves to Google Sheets in the background; artifact storage as local fallback) ----
async function loadState(){
  try{
    if(window.storage){
      const res = await window.storage.get('region-colors');
      if(res && res.value){
        regionColor = JSON.parse(res.value);
      }
    }
  }catch(e){ /* no saved data yet, or storage unavailable */ }
}
async function saveState(){
  try{
    if(window.storage){
      await window.storage.set('region-colors', JSON.stringify(regionColor));
    }
  }catch(e){ /* storage unavailable, state stays in-memory for this session */ }
  gsSave(true); // always visible, so any failure is obvious right away
}

function buildPalette(){
  COLORS.forEach((c, i) => {
    const sw = document.createElement('div');
    sw.className = 'swatch' + (i === 0 ? ' active' : '');
    sw.style.background = c.hex;
    sw.title = c.label;
    sw.addEventListener('click', () => selectColor(c.key));
    palette.insertBefore(sw, eraserBtn);
    swatchEls[c.key] = sw;
  });
  eraserBtn.addEventListener('click', () => selectColor(null));
}

function selectColor(key){
  activeColor = key;
  Object.values(swatchEls).forEach(el => el.classList.remove('active'));
  eraserBtn.classList.remove('active');
  if(key){ swatchEls[key].classList.add('active'); }
  else { eraserBtn.classList.add('active'); }
}

let legendCountEls = {};

function buildLegend(){
  legend.innerHTML = '';
  legendCountEls = {};
  COLORS.forEach(c => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<span class="legend-dot" style="background:${c.hex}"></span>${c.label}<span class="legend-count" id="legend-count-${c.key}">0</span>`;
    legend.appendChild(item);
    legendCountEls[c.key] = item.querySelector('.legend-count');
  });
}

function buildMap(){
  const ns = 'http://www.w3.org/2000/svg';
  MAP.regions.forEach(r => {
    const path = document.createElementNS(ns, 'path');
    path.setAttribute('d', r.d);
    path.setAttribute('class', 'region');
    path.setAttribute('data-id', r.id);
    path.setAttribute('data-name', r.name);
    path.addEventListener('click', () => paintRegion(r.id));
    path.addEventListener('mousemove', (e) => showTooltip(e, r.name));
    path.addEventListener('mouseleave', hideTooltip);
    svg.appendChild(path);
    pathEls[r.id] = path;
  });
  MAP.regions.forEach(r => {
    const label = document.createElementNS(ns, 'text');
    label.setAttribute('x', r.cx);
    label.setAttribute('y', r.cy);
    label.setAttribute('class', 'region-label');
    label.textContent = r.name;
    svg.appendChild(label);
  });
}

function showTooltip(e, name){
  const rect = stage.getBoundingClientRect();
  tooltip.textContent = name;
  tooltip.style.left = (e.clientX - rect.left) + 'px';
  tooltip.style.top = (e.clientY - rect.top) + 'px';
  tooltip.classList.add('show');
}
function hideTooltip(){ tooltip.classList.remove('show'); }

function applyRegionStyle(id){
  const el = pathEls[id];
  const key = regionColor[id];
  if(key && COLOR_MAP[key]){
    el.classList.add('colored');
    el.style.fill = COLOR_MAP[key].hex;
    el.style.stroke = COLOR_MAP[key].dark;
  } else {
    el.classList.remove('colored');
    el.style.fill = '';
    el.style.stroke = '';
  }
}

function paintRegion(id){
  if(activeColor === null){
    delete regionColor[id];
  } else if(regionColor[id] === activeColor){
    delete regionColor[id]; // click same color again to clear
  } else {
    regionColor[id] = activeColor;
  }
  applyRegionStyle(id);
  updateProgress();
  saveState();
}

function updateProgress(){
  const n = Object.keys(regionColor).length;
  const pct = Math.round((n / TOTAL) * 100);
  progressText.textContent = `${n}/${TOTAL} (${pct}%) 정복!`;

  progressBar.innerHTML = '';
  COLORS.forEach(c => {
    const count = Object.values(regionColor).filter(v => v === c.key).length;
    if(legendCountEls[c.key]) legendCountEls[c.key].textContent = count;
    if(count === 0) return;
    const seg = document.createElement('div');
    seg.className = 'progress-fill-seg';
    seg.style.width = (count / TOTAL * 100) + '%';
    seg.style.background = c.hex;
    progressBar.appendChild(seg);
  });
}

function refreshPaint(){
  MAP.regions.forEach(r => applyRegionStyle(r.id));
  updateProgress();
}

function draw(){
  const remaining = MAP.regions.filter(r => !regionColor[r.id]);
  if(remaining.length === 0){
    stampFace.textContent = '완주!';
    stampFace.classList.remove('placeholder');
    pickerHint.textContent = '모든 지역을 다 색칠했어요. 대단해요!';
    markVisitedBtn.disabled = true;
    return;
  }
  drawBtn.disabled = true;
  let ticks = 0;
  const maxTicks = 14;
  const interval = setInterval(() => {
    const r = MAP.regions[Math.floor(Math.random() * MAP.regions.length)];
    stampFace.textContent = r.name;
    stampFace.classList.remove('placeholder');
    ticks++;
    if(ticks >= maxTicks){
      clearInterval(interval);
      const finalR = remaining[Math.floor(Math.random() * remaining.length)];
      stampFace.textContent = finalR.name;
      lastDrawnId = finalR.id;
      pickerHint.textContent = `${finalR.name}, 아직 안 가보셨네요. 다녀오면 색칠해보세요!`;
      markVisitedBtn.disabled = false;
      drawBtn.disabled = false;
      flashRegion(finalR.id);
    }
  }, 60);
}

function flashRegion(id){
  const el = pathEls[id];
  if(!el) return;
  el.classList.add('highlight');
  el.scrollIntoView({behavior:'smooth', block:'center'});
  setTimeout(() => el.classList.remove('highlight'), 1400);
}

drawBtn.addEventListener('click', draw);
markVisitedBtn.addEventListener('click', () => {
  if(!lastDrawnId) return;
  const colorToUse = activeColor || COLORS[0].key;
  regionColor[lastDrawnId] = colorToUse;
  applyRegionStyle(lastDrawnId);
  updateProgress();
  saveState();
  markVisitedBtn.disabled = true;
  pickerHint.textContent = '색칠 완료! 다음 여행지도 뽑아보세요.';
});
resetBtn.addEventListener('click', () => {
  regionColor = {};
  refreshPaint();
  saveState();
  lastDrawnId = null;
  markVisitedBtn.disabled = true;
  stampFace.textContent = '뽑기 전';
  stampFace.classList.add('placeholder');
  pickerHint.textContent = '아직 안 가본 지역 중 하나를 뽑아드려요.';
});

gsLoadBtn.addEventListener('click', () => gsLoad(true));
gsSaveBtn.addEventListener('click', () => gsSave(true));

(async function init(){
  buildPalette();
  buildLegend();
  buildMap();
  await loadState();     // instant paint from local artifact storage, if any
  refreshPaint();
  selectColor(COLORS[0].key);
  document.getElementById('labelToggle').addEventListener('change', (e) => {
    stage.classList.toggle('labels-off', !e.target.checked);
  });
  // Always sync from the sheet on load too, since that's the durable source of
  // truth across refreshes/devices.
  await gsLoad(true);
})();
</script>
</body>
</html>
